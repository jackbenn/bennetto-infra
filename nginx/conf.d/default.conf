server {
    listen 80;
    server_name bennetto.com www.bennetto.com;

    # Let's Encrypt HTTP challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bennetto.com www.bennetto.com;

    ssl_certificate     /etc/letsencrypt/live/bennetto.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bennetto.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Static website
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # gengo Flask app
    location /gengo/ {
        proxy_pass http://gengo-web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # gengo WebSocket server — verify this path matches what the game JS uses
    location /gengo/ws {
        proxy_pass http://gengo-ws:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # taking_the_story FastAPI app
    # Full path is passed through; uvicorn uses --root-path /story to route correctly
    location /story/ {
        proxy_pass http://taking-the-story:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for /story/ws/...)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;
    }
}
