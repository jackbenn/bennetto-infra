# Allows the /story/ location to proxy both HTTP and WebSocket correctly:
# - WebSocket requests (Upgrade: websocket) get Connection: upgrade
# - Regular HTTP requests get Connection: close
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name bennetto.com www.bennetto.com;

    # Static website
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # gengo Flask app
    location /gengo/ {
        proxy_pass http://gengo-web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # gengo WebSocket server — verify this path matches what the game JS uses
    location /gengo/ws {
        proxy_pass http://gengo-ws:8765;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # taking_the_story FastAPI app
    # Full path is passed through; uvicorn uses --root-path /story to route correctly
    location /story/ {
        proxy_pass http://taking-the-story:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (for /story/ws/...)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
